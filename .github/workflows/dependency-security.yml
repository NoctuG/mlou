name: Dependency Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Monthly dependency hygiene check
    - cron: '0 3 1 * *'
    # Quarterly deep dependency regression window (Jan/Apr/Jul/Oct)
    - cron: '0 4 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  audit-production-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies (fail on high/critical)
        run: npm run deps:audit:prod

      - name: Check high-risk package updates
        run: npm run deps:check:risk
